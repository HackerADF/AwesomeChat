name: Build & Dev Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
      - 'gradle/wrapper/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle.properties'

jobs:
  build:
    # Also skip if commit message contains [ci skip] or [skip ci]
    if: >
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew shadowJar

      - name: Get version info
        id: info
        run: |
          VERSION=$(grep "^version" build.gradle | sed "s/version = '//;s/'//")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=dev-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Delete old dev releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep the 5 most recent dev releases, delete the rest
          gh release list --limit 100 --json tagName,createdAt \
            --jq '[.[] | select(.tagName | startswith("dev-"))] | sort_by(.createdAt) | reverse | .[5:][] | .tagName' \
          | while read -r tag; do
            echo "Deleting old dev release: $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done

      - name: Create dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.info.outputs.tag }}" \
            --title "Dev Build ${{ steps.info.outputs.version }}-${{ steps.info.outputs.short_sha }}" \
            --notes "$(cat <<EOF
          **Automated dev build** from [\`${{ steps.info.outputs.short_sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

          > ${{ github.event.head_commit.message }}

          :warning: This is an unstable development build. Use at your own risk.
          EOF
          )" \
            --prerelease \
            build/libs/AwesomeChat-${{ steps.info.outputs.version }}.jar
